<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Salven Kitchen — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="eyebrow">The Salven</div>
  <h1 class="logo">KITCHEN</h1>
  <div class="tagline">Roanoke, TX · Scratch kitchen, shareable plates</div>
</header>

<nav class="categories" id="catNav">
  <a href="#appetizers">Appetizers</a>
  <a href="#handhelds">Handhelds</a>
  <a href="#flatbread">Flatbread</a>
  <a href="#salads">Salads</a>
  <a href="#sweet">Sweet</a>
</nav>

<img class="hero-photo" src="images/pizza.png" alt="Hot Honey Pepperoni flatbread pizza fresh from the oven">

<main id="menuRoot">
  <div class="loading">Loading menu…</div>
</main>

<footer>
  <div class="row"><span class="dot">✉</span><a href="mailto:Salvenkitchen@gmail.com">Salvenkitchen@gmail.com</a></div>
  <div class="row"><span class="dot">☎</span><a href="tel:6823660121">682-366-0121</a></div>
  <div class="row"><span class="dot">⚑</span><span>206 N Oak St, Suite 150, Roanoke, TX 76262</span></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://srtznkhzrauvgdgxlmfs.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydHpua2h6cmF1dmdkZ3hsbWZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMTczMTMsImV4cCI6MjA5ODc5MzMxM30.bIVsPdPAoSqIBxih3OW31JHbu3mKzZ2iFGwqRTl6DQg";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CATEGORY_LABELS = {
    appetizers: "Shareable / Appetizers",
    handhelds: "Handhelds",
    flatbread: "Flatbread Pizza",
    salads: "Salads",
    sweet: "Something Sweet"
  };

  const CATEGORY_ORDER = ["appetizers", "handhelds", "flatbread", "salads", "sweet"];

  // Gallery/feature photos stay static per category (not tied to individual items)
  const CATEGORY_MEDIA = {
    appetizers: `<div class="gallery">
      <img src="images/Fruits.png" alt="Charcuterie and cheese board">
      <img src="images/Cauliflower.png" alt="Buffalo cauliflower bites">
      <img src="images/Tacos.png" alt="Chicken street tacos">
    </div>`,
    handhelds: `<div class="gallery two">
      <img src="images/Burger.png" alt="Texas Philly cheesesteak sandwich">
      <img src="images/Sandwich.png" alt="Hot honey grilled cheese sandwich">
    </div>`,
    flatbread: "",
    salads: `<img class="feature-photo" src="images/Salad.png" alt="Pear and goat cheese salad">`,
    sweet: `<img class="feature-photo" src="images/Churos.jpeg" alt="Caramel chocolate churros">`
  };

  const CATEGORY_NOTE = {
    handhelds: "Add french fries for $2.50"
  };

  function money(n) {
    return "$" + Number(n).toFixed(2);
  }

  function renderItem(item) {
    const addon = item.addon_note
      ? `<div class="addon">${item.addon_note}</div>`
      : "";
    return `
      <div class="item">
        <div class="item-top">
          <span class="item-name">${item.name}</span>
          <span class="leader"></span>
          <span class="price">${money(item.price)}</span>
        </div>
        ${item.description ? `<div class="desc">${item.description}</div>` : ""}
        ${addon}
      </div>`;
  }

  async function loadMenu() {
    const root = document.getElementById("menuRoot");
    const { data, error } = await supabase
      .from("menu_items")
      .select("*")
      .order("category")
      .order("sort_order");

    if (error) {
      root.innerHTML = `<div class="loading">Couldn't load the menu right now. Please refresh.</div>`;
      console.error(error);
      return;
    }

    const grouped = {};
    for (const item of data) {
      if (!grouped[item.category]) grouped[item.category] = [];
      grouped[item.category].push(item);
    }

    let html = "";
    for (const cat of CATEGORY_ORDER) {
      if (!grouped[cat] || grouped[cat].length === 0) continue;
      html += `
        <section class="category" id="${cat}">
          <div class="cat-head"><h2>${CATEGORY_LABELS[cat]}</h2></div>
          ${CATEGORY_NOTE[cat] ? `<p class="cat-note">${CATEGORY_NOTE[cat]}</p>` : ""}
          <hr class="rule">
          ${CATEGORY_MEDIA[cat] || ""}
          ${grouped[cat].map(renderItem).join("")}
        </section>`;
    }

    root.innerHTML = html;
    setupScrollSpy();
  }

  function setupScrollSpy() {
    const links = document.querySelectorAll('nav.categories a');
    const sections = document.querySelectorAll('section.category');
    const nav = document.getElementById('catNav');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          const active = document.querySelector('nav.categories a[href="#' + entry.target.id + '"]');
          if (active) {
            active.classList.add('active');
            const navRect = nav.getBoundingClientRect();
            const linkRect = active.getBoundingClientRect();
            nav.scrollLeft += (linkRect.left - navRect.left) - 16;
          }
        }
      });
    }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });

    sections.forEach(s => observer.observe(s));
  }

  loadMenu();
</script>

</body>
</html>
